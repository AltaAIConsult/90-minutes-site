<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Predictor | 90 Minutes or More</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .font-anton { font-family: 'Anton', sans-serif; }
        .team-btn { transition: all 0.2s ease; cursor: pointer; border-width: 2px; }
        .team-btn.selected-1st { background-color: #22c55e; color: white; border-color: #16a34a; }
        .team-btn.selected-2nd { background-color: #3b82f6; color: white; border-color: #2563eb; }
        .team-btn.selected-3rd { background-color: #f59e0b; color: white; border-color: #d97706; }
        .team-btn.selected-4th { background-color: #ef4444; color: white; border-color: #dc2626; opacity: 0.8; }
        .step { display: none; }
        .step.active { display: block; }
        .progress-bar { transition: width 0.3s ease; }
        .third-place-btn.selected { background-color: #22c55e; color: white; border-color: #16a34a; }
        button:disabled { opacity: 0.3 !important; cursor: not-allowed !important; }
        
        /* Specific selection highlight for the Final cards */
        .final-card.selected { 
            background-color: #dc2626 !important; 
            border-color: #991b1b !important; 
            color: white !important; 
            transform: scale(1.05); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2); 
        }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/index.html" class="flex items-center group">
                <img src="/images/logo.jpeg" alt="90 Minutes" class="h-10 mr-2">
                <span class="font-anton text-xl"><span class="text-red-600">90</span>MINUTES</span>
            </a>
            <div class="flex items-center space-x-4">
                <span id="step-indicator" class="text-sm text-gray-600 font-bold">Step 1/7</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <div class="text-center mb-8">
            <h1 class="font-anton text-4xl md:text-5xl uppercase mb-2">World Cup <span class="text-red-600">2026</span> Predictor</h1>
            <p class="text-gray-600 font-medium">Accurate Brackets. Easy Selection. (Page Refresh Resets Progress)</p>
        </div>

        <div class="mb-8 bg-gray-200 rounded-full h-3 overflow-hidden border border-gray-300">
            <div id="progress-bar" class="progress-bar bg-red-600 h-full w-0"></div>
        </div>

        <div id="steps-container"></div>

        <div id="third-place-step" class="step">
            <div class="bg-white rounded-xl shadow-lg p-6 mb-6 border-t-4 border-red-600 text-center">
                <h2 class="font-anton text-2xl uppercase mb-2 text-red-600">Best Third-Place Teams</h2>
                <p class="text-gray-600 mb-6">Select exactly 8 teams to advance to the Round of 32.</p>
                <div id="third-place-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 mb-4"></div>
                <div class="flex justify-between items-center mt-6 pt-4 border-t">
                    <button onclick="goToPrevStep()" class="bg-gray-200 px-6 py-2 rounded font-bold">← Back</button>
                    <span id="third-place-count" class="text-lg font-bold text-red-600">Selected: 0/8</span>
                    <button id="next-from-third" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-8 rounded-md transition" disabled>Next Round →</button>
                </div>
            </div>
        </div>

        <div id="round32-step" class="step">
            <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
                <h2 class="font-anton text-2xl uppercase mb-4 text-red-600 text-center">Round of 32</h2>
                <div id="round32-matches" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                <div class="flex gap-4 mt-8">
                    <button onclick="goToPrevStep()" class="w-1/3 bg-gray-200 font-bold py-3 rounded-md">← Back</button>
                    <button id="next-from-round32" class="w-2/3 bg-red-600 text-white font-bold py-3 rounded-md" disabled>Round of 16 →</button>
                </div>
            </div>
        </div>

        <div id="round16-step" class="step">
            <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
                <h2 class="font-anton text-2xl uppercase mb-4 text-red-600 text-center">Round of 16</h2>
                <div id="round16-matches" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <div class="flex gap-4 mt-8">
                    <button onclick="goToPrevStep()" class="w-1/3 bg-gray-200 font-bold py-3 rounded-md">← Back</button>
                    <button id="next-from-round16" class="w-2/3 bg-red-600 text-white font-bold py-3 rounded-md" disabled>Quarter-finals →</button>
                </div>
            </div>
        </div>

        <div id="quarterfinals-step" class="step">
            <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
                <h2 class="font-anton text-2xl uppercase mb-4 text-red-600 text-center">Quarter-finals</h2>
                <div id="quarterfinals-matches" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <div class="flex gap-4 mt-8">
                    <button onclick="goToPrevStep()" class="w-1/3 bg-gray-200 font-bold py-3 rounded-md">← Back</button>
                    <button id="next-from-quarterfinals" class="w-2/3 bg-red-600 text-white font-bold py-3 rounded-md" disabled>Semi-finals →</button>
                </div>
            </div>
        </div>

        <div id="semifinals-step" class="step">
            <div class="bg-white rounded-xl shadow-lg p-6 mb-6 text-center">
                <h2 class="font-anton text-2xl uppercase mb-4 text-red-600">Semi-finals</h2>
                <div id="semifinals-matches" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <div class="flex gap-4 mt-8">
                    <button onclick="goToPrevStep()" class="w-1/3 bg-gray-200 font-bold py-3 rounded-md">← Back</button>
                    <button id="next-from-semifinals" class="w-2/3 bg-red-600 text-white font-bold py-3 rounded-md" disabled>The Final →</button>
                </div>
            </div>
        </div>

        <div id="final-step" class="step">
            <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
                <h2 class="font-anton text-3xl uppercase mb-6 text-center text-red-600">World Cup Final</h2>
                <div id="final-match-container" class="max-w-2xl mx-auto mb-10"></div>

                <div class="max-w-md mx-auto p-6 bg-gray-50 border-2 border-dashed border-gray-300 rounded-xl">
                    <h3 class="font-anton text-xl mb-4 text-center">Join the Leaderboard</h3>
                    <div class="space-y-4">
                        <input type="text" id="user-name" placeholder="Display Name" class="w-full border p-3 rounded">
                        <input type="email" id="user-email" placeholder="Email Address *" class="w-full border p-3 rounded" required>
                        <button id="submit-prediction" class="w-full bg-red-600 text-white font-anton py-4 rounded uppercase text-xl shadow-lg" disabled>Submit Prediction</button>
                        <div id="submission-message" class="hidden mt-4 p-4 rounded text-center"></div>
                    </div>
                </div>
                <div class="flex justify-center mt-8">
                    <button onclick="goToPrevStep()" class="text-gray-400 font-bold hover:underline">← Go Back to Bracket</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CLEAN START ENFORCED
        localStorage.clear(); sessionStorage.clear();

        const GROUPS_DATA = {
            'A': { teams: ['Mexico', 'South Africa', 'Korea Republic', 'Czechia'], positions: {}, completed: false },
            'B': { teams: ['Canada', 'Bosnia and Herzegovina', 'Qatar', 'Switzerland'], positions: {}, completed: false },
            'C': { teams: ['Brazil', 'Morocco', 'Haiti', 'Scotland'], positions: {}, completed: false },
            'D': { teams: ['USA', 'Paraguay', 'Australia', 'Türkiye'], positions: {}, completed: false },
            'E': { teams: ['Germany', 'Curaçao', 'Ivory Coast', 'Ecuador'], positions: {}, completed: false },
            'F': { teams: ['Netherlands', 'Japan', 'Sweden', 'Tunisia'], positions: {}, completed: false },
            'G': { teams: ['Belgium', 'Egypt', 'IR Iran', 'New Zealand'], positions: {}, completed: false },
            'H': { teams: ['Spain', 'Cabo Verde', 'Saudi Arabia', 'Uruguay'], positions: {}, completed: false },
            'I': { teams: ['France', 'Senegal', 'Iraq', 'Norway'], positions: {}, completed: false },
            'J': { teams: ['Argentina', 'Algeria', 'Austria', 'Jordan'], positions: {}, completed: false },
            'K': { teams: ['Portugal', 'Congo DR', 'Uzbekistan', 'Colombia'], positions: {}, completed: false },
            'L': { teams: ['England', 'Croatia', 'Ghana', 'Panama'], positions: {}, completed: false }
        };

        const FLAG_MAP = {
            'Mexico': '🇲🇽', 'Korea Republic': '🇰🇷', 'South Africa': '🇿🇦', 'Czechia': '🇨🇿',
            'Canada': '🇨🇦', 'Bosnia and Herzegovina': '🇧🇦', 'Qatar': '🇶🇦', 'Switzerland': '🇨🇭',
            'Brazil': '🇧🇷', 'Morocco': '🇲🇦', 'Haiti': '🇭🇹', 'Scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿',
            'USA': '🇺🇸', 'Paraguay': '🇵🇾', 'Australia': '🇦🇺', 'Türkiye': '🇹🇷',
            'Germany': '🇩🇪', 'Curaçao': '🇨🇼', 'Ivory Coast': '🇨🇮', 'Ecuador': '🇪🇨',
            'Netherlands': '🇳🇱', 'Japan': '🇯🇵', 'Sweden': '🇸🇪', 'Tunisia': '🇹🇳',
            'Belgium': '🇧🇪', 'Egypt': '🇪🇬', 'IR Iran': '🇮🇷', 'New Zealand': '🇳🇿',
            'Spain': '🇪🇸', 'Cabo Verde': '🇨🇻', 'Saudi Arabia': '🇸🇦', 'Uruguay': '🇺🇾',
            'France': '🇫🇷', 'Senegal': '🇸🇳', 'Iraq': '🇮🇶', 'Norway': '🇳🇴',
            'Argentina': '🇦🇷', 'Algeria': '🇩🇿', 'Austria': '🇦🇹', 'Jordan': '🇯🇴',
            'Portugal': '🇵🇹', 'Congo DR': '🇨🇩', 'Uzbekistan': '🇺🇿', 'Colombia': '🇨🇴',
            'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Croatia': '🇭🇷', 'Ghana': '🇬🇭', 'Panama': '🇵🇦'
        };

        const R32_BASE = [
            { id: 73, h: 'A2', a: 'B2', loc: 'Los Angeles Stadium' },
            { id: 74, h: 'E1', a: '3rd(ABCD F)', loc: 'Boston Stadium' },
            { id: 75, h: 'F1', a: 'C2', loc: 'Estadio Monterrey' },
            { id: 76, h: 'C1', a: 'F2', loc: 'Houston Stadium' },
            { id: 77, h: 'I1', a: '3rd(CDFG H)', loc: 'NY/NJ Stadium' },
            { id: 78, h: 'E2', a: 'I2', loc: 'Dallas Stadium' },
            { id: 79, h: 'A1', a: '3rd(CEFHI)', loc: 'Mexico City Stadium' },
            { id: 80, h: 'L1', a: '3rd(EHIJK)', loc: 'Atlanta Stadium' },
            { id: 81, h: 'D1', a: '3rd(BEFIJ)', loc: 'San Fran Stadium' },
            { id: 82, h: 'G1', a: '3rd(AEHIJ)', loc: 'Seattle Stadium' },
            { id: 83, h: 'K2', a: 'L2', loc: 'Toronto Stadium' },
            { id: 84, h: 'H1', a: 'J2', loc: 'Los Angeles Stadium' },
            { id: 85, h: 'B1', a: '3rd(EFGIJ)', loc: 'BC Place Vancouver' },
            { id: 86, h: 'J1', a: 'H2', loc: 'Miami Stadium' },
            { id: 87, h: 'K1', a: '3rd(DEIJL)', loc: 'Kansas City Stadium' },
            { id: 88, h: 'D2', a: 'G2', loc: 'Dallas Stadium' }
        ];

        let userState = {
            groupStage: JSON.parse(JSON.stringify(GROUPS_DATA)),
            thirdPlaceSelected: [],
            knockout: { round32: {}, round16: {}, quarterfinals: {}, semifinals: {}, final: null },
            currentGroupIdx: 0,
            currentStep: 0
        };

        function renderCurrentStep() {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            const container = document.getElementById('steps-container');
            container.innerHTML = '';
            
            const steps = [
                renderGroupStep,
                renderThirdPlaceStep,
                () => renderKnockout('round32', getR32Data(), 'round32-matches', 'round32-step'),
                () => renderKnockout('round16', getR16Data(), 'round16-matches', 'round16-step'),
                () => renderKnockout('quarterfinals', getQFData(), 'quarterfinals-matches', 'quarterfinals-step'),
                () => renderKnockout('semifinals', getSFData(), 'semifinals-matches', 'semifinals-step'),
                renderFinalStep
            ];
            steps[userState.currentStep]();
            updateHeader();
        }

        function updateHeader() {
            document.getElementById('step-indicator').innerText = `Step ${userState.currentStep + 1}/7`;
            document.getElementById('progress-bar').style.width = `${(userState.currentStep / 6) * 100}%`;
        }

        function goToPrevStep() {
            if (userState.currentStep > 0) {
                userState.currentStep--;
                if (userState.currentStep === 0) userState.currentGroupIdx = 11;
                renderCurrentStep();
            }
        }

        // --- GROUP STEP ---
        function renderGroupStep() {
            const container = document.getElementById('steps-container');
            const letter = Object.keys(userState.groupStage)[userState.currentGroupIdx];
            const data = userState.groupStage[letter];

            let html = `<div class="bg-white rounded-xl shadow-lg p-6 border-t-4 border-black">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-anton text-4xl uppercase">Group ${letter}</h2>
                    <span class="text-sm font-bold bg-gray-100 px-3 py-1 rounded">Group ${userState.currentGroupIdx + 1} of 12</span>
                </div>
                <div class="grid grid-cols-1 gap-3">`;

            data.teams.forEach(team => {
                let posClass = '';
                let label = 'Unranked';
                for (let k in data.positions) if (data.positions[k] === team) { posClass = `selected-${k}`; label = k; }
                
                html += `<div class="team-btn ${posClass} border-2 rounded-lg p-4 flex justify-between items-center font-bold text-lg" onclick="handleGroupClick('${letter}', '${team.replace("'", "\\'")}')">
                    <div class="flex items-center gap-4"><span>${FLAG_MAP[team]}</span><span>${team}</span></div>
                    <span class="font-anton text-sm uppercase opacity-70">${label}</span>
                </div>`;
            });

            html += `</div><div class="flex justify-between mt-8 pt-4 border-t">
                <button onclick="prevGroup()" class="bg-gray-200 px-6 py-2 rounded font-bold ${userState.currentGroupIdx === 0 ? 'invisible' : ''}">← Back</button>
                <button onclick="resetGroup('${letter}')" class="text-red-600 font-bold hover:underline">Clear Group</button>
                <button id="group-next" onclick="nextGroup()" class="bg-red-600 text-white px-8 py-2 rounded font-bold" ${!data.completed ? 'disabled' : ''}>Next Group →</button>
            </div></div>`;
            container.innerHTML = html;
        }

        window.handleGroupClick = (letter, team) => {
            const d = userState.groupStage[letter];
            let found = false;
            for (let k in d.positions) { if (d.positions[k] === team) found = true; if (found) d.positions[k] = null; }
            if (!found) {
                if (!d.positions['1st']) d.positions['1st'] = team;
                else if (!d.positions['2nd']) d.positions['2nd'] = team;
                else if (!d.positions['3rd']) {
                    d.positions['3rd'] = team;
                    d.positions['4th'] = d.teams.find(t => !Object.values(d.positions).includes(t));
                }
            }
            d.completed = !!(d.positions['1st'] && d.positions['2nd'] && d.positions['3rd']);
            renderGroupStep();
        };

        window.resetGroup = (letter) => {
            userState.groupStage[letter].positions = {};
            userState.groupStage[letter].completed = false;
            renderGroupStep();
        };

        window.nextGroup = () => {
            if (userState.currentGroupIdx < 11) userState.currentGroupIdx++;
            else userState.currentStep = 1;
            renderCurrentStep();
        };
        window.prevGroup = () => { if (userState.currentGroupIdx > 0) userState.currentGroupIdx--; renderGroupStep(); };

        // --- 3rd PLACE STEP ---
        function renderThirdPlaceStep() {
            document.getElementById('third-place-step').classList.add('active');
            const list = document.getElementById('third-place-list');
            list.innerHTML = '';
            Object.keys(userState.groupStage).forEach(l => {
                const team = userState.groupStage[l].positions['3rd'];
                const active = userState.thirdPlaceSelected.includes(l);
                list.innerHTML += `<div onclick="toggle3rd('${l}')" class="third-place-btn border-2 p-4 rounded-lg cursor-pointer text-center ${active ? 'selected shadow-md' : 'bg-white'}">
                    <div class="text-4xl mb-2">${FLAG_MAP[team]}</div><div class="font-bold">${team}</div><div class="text-xs uppercase opacity-60">Group ${l}</div>
                </div>`;
            });
            document.getElementById('third-place-count').innerText = `Selected: ${userState.thirdPlaceSelected.length}/8`;
            document.getElementById('next-from-third').disabled = userState.thirdPlaceSelected.length !== 8;
        }

        window.toggle3rd = (l) => {
            const i = userState.thirdPlaceSelected.indexOf(l);
            if (i > -1) userState.thirdPlaceSelected.splice(i, 1);
            else if (userState.thirdPlaceSelected.length < 8) userState.thirdPlaceSelected.push(l);
            renderThirdPlaceStep();
        };

        // --- ROUND OF 32 MATCHUP ALGORITHM ---
        function getR32Data() {
            let used3rd = [];
            let available3rd = [...userState.thirdPlaceSelected];
            return R32_BASE.map(m => {
                let home = "TBD", away = "TBD";
                if (m.h.length === 2) { home = userState.groupStage[m.h[0]].positions[m.h[1] === '1' ? '1st' : '2nd']; } 
                else {
                    const allowedStr = m.h.match(/\(([^)]+)\)/)[1].replace(/ /g, '');
                    const letter = available3rd.find(l => allowedStr.includes(l) && !used3rd.includes(l));
                    if (letter) { home = userState.groupStage[letter].positions['3rd']; used3rd.push(letter); }
                }
                if (m.a.length === 2) { away = userState.groupStage[m.a[0]].positions[m.a[1] === '1' ? '1st' : '2nd']; } 
                else {
                    const allowedStr = m.a.match(/\(([^)]+)\)/)[1].replace(/ /g, '');
                    const letter = available3rd.find(l => allowedStr.includes(l) && !used3rd.includes(l));
                    if (letter) { away = userState.groupStage[letter].positions['3rd']; used3rd.push(letter); }
                }
                // Safety fill for 3rd place slots
                if (m.h.includes('3rd') && home === "TBD") { 
                    const backup = available3rd.find(l => !used3rd.includes(l));
                    if (backup) { home = userState.groupStage[backup].positions['3rd']; used3rd.push(backup); }
                }
                if (m.a.includes('3rd') && away === "TBD") { 
                    const backup = available3rd.find(l => !used3rd.includes(l));
                    if (backup) { away = userState.groupStage[backup].positions['3rd']; used3rd.push(backup); }
                }
                return { id: m.id, home, away, loc: m.loc };
            });
        }

        // --- GENERAL KNOCKOUT RENDERER ---
        function renderKnockout(stageKey, fixtures, containerId, stepId) {
            document.getElementById(stepId).classList.add('active');
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            fixtures.forEach(f => {
                const win = userState.knockout[stageKey][f.id];
                container.innerHTML += `<div class="bg-gray-50 border p-4 rounded-lg">
                    <div class="text-[10px] font-bold text-red-600 mb-1 uppercase tracking-tight">Match ${f.id} · ${f.loc}</div>
                    <div class="space-y-2">
                        <div onclick="pickWinner('${stageKey}', ${f.id}, '${f.home.replace("'", "\\'")}')" class="flex justify-between items-center p-3 rounded border-2 cursor-pointer transition ${win === f.home && f.home !== 'TBD' ? 'bg-green-600 border-green-700 text-white shadow-md' : 'bg-white'}">
                            <span>${f.home !== 'TBD' ? FLAG_MAP[f.home] + ' ' + f.home : 'TBD'}</span>
                        </div>
                        <div onclick="pickWinner('${stageKey}', ${f.id}, '${f.away.replace("'", "\\'")}')" class="flex justify-between items-center p-3 rounded border-2 cursor-pointer transition ${win === f.away && f.away !== 'TBD' ? 'bg-green-600 border-green-700 text-white shadow-md' : 'bg-white'}">
                            <span>${f.away !== 'TBD' ? FLAG_MAP[f.away] + ' ' + f.away : 'TBD'}</span>
                        </div>
                    </div>
                </div>`;
            });
            const btn = document.getElementById(`next-from-${stageKey}`);
            if (btn) btn.disabled = Object.keys(userState.knockout[stageKey]).length < fixtures.length;
        }

        window.pickWinner = (stage, id, team) => {
            if (!team || team === 'TBD') return;
            userState.knockout[stage][id] = team;
            renderCurrentStep();
        };

        // --- THE FIXED FINAL STEP ---
        function renderFinalStep() {
            document.getElementById('final-step').classList.add('active');
            const f1 = userState.knockout.semiffinals ? userState.knockout.semifinals[101] : (userState.knockout.semifinals?.[101] || 'TBD');
            // Safely get semifinalists
            const finalist1 = userState.knockout.semifinals?.[101] || 'TBD';
            const finalist2 = userState.knockout.semifinals?.[102] || 'TBD';
            const winner = userState.knockout.final;
            
            document.getElementById('final-match-container').innerHTML = `
                <div class="border-4 border-red-600 p-8 rounded-2xl bg-white shadow-2xl text-center">
                    <div class="text-[12px] font-bold text-red-600 mb-4 uppercase">Match 104 · NY/NJ Stadium · Sunday 19 July</div>
                    <div class="flex flex-col md:flex-row justify-center items-center gap-10">
                        <div id="final-card-1" class="final-card p-8 rounded-xl border-4 cursor-pointer w-full max-w-[220px] transition bg-gray-50 border-gray-100 hover:bg-gray-100" data-team="${finalist1}">
                            <div class="text-7xl mb-4">${finalist1 !== 'TBD' ? FLAG_MAP[finalist1] : '🏁'}</div>
                            <div class="font-anton text-xl tracking-wide uppercase">${finalist1}</div>
                        </div>
                        <div class="font-anton text-4xl italic text-gray-300">VS</div>
                        <div id="final-card-2" class="final-card p-8 rounded-xl border-4 cursor-pointer w-full max-w-[220px] transition bg-gray-50 border-gray-100 hover:bg-gray-100" data-team="${finalist2}">
                            <div class="text-7xl mb-4">${finalist2 !== 'TBD' ? FLAG_MAP[finalist2] : '🏁'}</div>
                            <div class="font-anton text-xl tracking-wide uppercase">${finalist2}</div>
                        </div>
                    </div>
                    ${winner && winner !== 'TBD' ? `<div class="mt-8 text-2xl font-anton text-green-600 uppercase animate-bounce">2026 Champion: ${winner}!</div>` : ''}
                </div>`;

            // Visual Update
            const c1 = document.getElementById('final-card-1');
            const c2 = document.getElementById('final-card-2');
            if (winner && winner === finalist1) c1.classList.add('selected');
            if (winner && winner === finalist2) c2.classList.add('selected');

            // Attach Click Handlers
            if (c1 && finalist1 !== 'TBD') c1.onclick = () => { userState.knockout.final = finalist1; renderFinalStep(); };
            if (c2 && finalist2 !== 'TBD') c2.onclick = () => { userState.knockout.final = finalist2; renderFinalStep(); };
            
            document.getElementById('submit-prediction').disabled = !userState.knockout.final || userState.knockout.final === 'TBD';
        }

        // --- DATA MAPPING ---
        function getR16Data() { return [{id:89,hM:74,aM:77,loc:'Philadelphia'},{id:90,hM:73,aM:75,loc:'Houston'},{id:91,hM:76,aM:78,loc:'NY/NJ'},{id:92,hM:79,aM:80,loc:'Mexico City'},{id:93,hM:83,aM:84,loc:'Dallas'},{id:94,hM:81,aM:82,loc:'Seattle'},{id:95,hM:86,aM:88,loc:'Atlanta'},{id:96,hM:85,aM:87,loc:'Vancouver'}].map(m => ({id:m.id, home:userState.knockout.round32[m.hM], away:userState.knockout.round32[m.aM], loc:m.loc})); }
        function getQFData() { return [{id:97,hM:89,aM:90,loc:'Boston'},{id:98,hM:93,aM:94,loc:'Los Angeles'},{id:99,hM:91,aM:92,loc:'Miami'},{id:100,hM:95,aM:96,loc:'Kansas City'}].map(m => ({id:m.id, home:userState.knockout.round16[m.hM], away:userState.knockout.round16[m.aM], loc:m.loc})); }
        function getSFData() { return [{id:101,hM:97,aM:98,loc:'Dallas'},{id:102,hM:99,aM:100,loc:'Atlanta'}].map(m => ({id:m.id, home:userState.knockout.quarterfinals[m.hM], away:userState.knockout.quarterfinals[m.aM], loc:m.loc})); }

        document.getElementById('next-from-third').onclick = () => { userState.currentStep = 2; renderCurrentStep(); };
        document.getElementById('next-from-round32').onclick = () => { userState.currentStep = 3; renderCurrentStep(); };
        document.getElementById('next-from-round16').onclick = () => { userState.currentStep = 4; renderCurrentStep(); };
        document.getElementById('next-from-quarterfinals').onclick = () => { userState.currentStep = 5; renderCurrentStep(); };
        document.getElementById('next-from-semifinals').onclick = () => { userState.currentStep = 6; renderCurrentStep(); };

        document.getElementById('submit-prediction').onclick = async () => {
            const e = document.getElementById('user-email').value;
            const n = document.getElementById('user-name').value;
            if(!e) return alert("Email required.");
            const btn = document.getElementById('submit-prediction');
            btn.disabled = true; btn.innerText = "Submitting...";
            try {
                const response = await fetch('/.netlify/functions/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: e, name: n, prediction: userState })
                });
                if (response.ok) {
                    document.getElementById('submission-message').innerHTML = `<div class="bg-green-100 text-green-800 p-6 rounded-xl border-2">✅ Success! Check email (${e}) to verify.</div>`;
                    document.getElementById('submission-message').classList.remove('hidden'); btn.classList.add('hidden');
                }
            } catch (err) { btn.disabled = false; alert("Server error."); }
        };

        renderCurrentStep();
    </script>
</body>
</html>
